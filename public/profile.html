<!DOCTYPE html>
<html>

<head>

<title>Profile</title>

<style>
        /* ========================= GLOBAL ========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            padding: 30px 15px;
        }

        /* ========================= PROFILE BOX ========================= */
        .box {
            width: 100%;
            max-width: 500px;
            margin: 20px auto;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
        }

        /* ========================= TITLE ========================= */
        h2 {
            text-align: center;
            color: #5b21b6;
            font-size: 30px;
            margin-bottom: 25px;
        }

        /* ========================= USER INFO ========================= */
        .info {
            display: grid;
            gap: 15px;
            margin-bottom: 25px;
        }

        .info-card {
            padding: 18px;
            border-radius: 15px;
            background: linear-gradient(135deg, #f3e8ff, #ede9fe);
            border-left: 5px solid #7c3aed;
            box-shadow: 0 5px 15px rgba(124, 58, 237, 0.12);
        }

        .info-card p {
            color: #555;
            font-size: 15px;
        }

        .info-card span {
            display: block;
            color: #111827;
            font-size: 20px;
            font-weight: bold;
            margin-top: 5px;
        }

        /* ========================= WALLET ========================= */
        .wallet-card {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            padding: 22px;
            border-radius: 18px;
            margin-bottom: 15px;
            box-shadow: 0 10px 25px rgba(17, 153, 142, 0.3);
        }

        .wallet-card p {
            font-size: 15px;
            opacity: 0.9;
        }

        .wallet-card span {
            display: block;
            font-size: 30px;
            font-weight: bold;
            margin-top: 8px;
        }

        /* ========================= TOTAL EARN ========================= */
        .earn-card {
            background: linear-gradient(135deg, #ff9966, #ff5e62);
            color: white;
            padding: 22px;
            border-radius: 18px;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(255, 94, 98, 0.3);
        }

        .earn-card p {
            font-size: 15px;
            opacity: 0.9;
        }

        .earn-card span {
            display: block;
            font-size: 30px;
            font-weight: bold;
            margin-top: 8px;
        }

        /* ========================= WITHDRAW HISTORY ========================= */
        h3 {
            color: #4c1d95;
            margin-bottom: 15px;
            font-size: 21px;
        }

        #history {
            max-height: 300px;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* ========================= HISTORY ITEM ========================= */
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background: #f8f7ff;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
        }

        .amount {
            font-size: 18px;
            font-weight: bold;
            color: #7c3aed;
        }

        .status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            text-transform: capitalize;
        }

        /* STATUS COLORS */
        .status.pending {
            background: #fff3cd;
            color: #856404;
        }

        .status.approved {
            background: #d1fae5;
            color: #047857;
        }

        .status.rejected {
            background: #fee2e2;
            color: #dc2626;
        }

        /* ========================= LOGOUT BUTTON ========================= */
        button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.3);
        }

        /* ========================= MOBILE ========================= */
        @media(max-width:500px) {
            body {
                padding: 15px 10px;
            }

            .box {
                margin: 10px auto;
                padding: 20px;
                border-radius: 20px;
            }

            h2 {
                font-size: 25px;
            }

            .wallet-card span,
            .earn-card span {
                font-size: 25px;
            }

            .history-item {
                padding: 12px;
            }
        }

        /* ========================= EMPTY HISTORY ========================= */
        .empty {
            text-align: center;
            padding: 20px;
            color: #777;
            background: #f9fafb;
            border-radius: 12px;
        }
    </style>
</head>

<body>

<div class="box">

<h2>User Profile</h2>

<p>Name : <span id="name"></span></p>

<p>Mobile : <span id="mobile"></span></p>

<p>Wallet : ₹<span id="wallet"></span></p>

<p>Total Earn : ₹<span id="earn"></span></p>

<h3>Withdraw History</h3>

<div id="history"></div>

<button onclick="logout()">

Logout

</button>

</div>

<script>

const token = localStorage.getItem("token");

if(!token){

location.href="login.html";

}

async function loadProfile(){

const res=await fetch(

"/api/profile",

{

headers:{

Authorization:"Bearer "+token

}

}

);

const data=await res.json();

const u=data.user;

document.getElementById("name").innerHTML=u.name;

document.getElementById("mobile").innerHTML=u.mobile;

document.getElementById("wallet").innerHTML=u.wallet;

document.getElementById("earn").innerHTML=u.totalEarn;

let html="";

u.withdrawRequests.forEach(w=>{

html+=`

<p>

₹${w.amount}

-

${w.status}

</p>

`;

});

document.getElementById("history").innerHTML=html;

}

function logout(){

localStorage.removeItem("token");

location.href="login.html";

}

loadProfile();

</script>

</body>

</html>
