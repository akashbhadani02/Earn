<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
overflow:hidden;
}

body::before{
content:"";
position:absolute;
width:450px;
height:450px;
background:rgba(255,255,255,.08);
border-radius:50%;
top:-150px;
left:-120px;
filter:blur(20px);
}

body::after{
content:"";
position:absolute;
width:350px;
height:350px;
background:rgba(255,255,255,.06);
border-radius:50%;
bottom:-120px;
right:-100px;
filter:blur(20px);
}

.login-box{
position:relative;
width:380px;
padding:40px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.2);
border-radius:20px;
box-shadow:0 20px 45px rgba(0,0,0,.35);
z-index:2;
animation:fadeIn .8s ease;
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.logo{
font-size:65px;
text-align:center;
margin-bottom:10px;
}

h2{
text-align:center;
color:#fff;
margin-bottom:30px;
font-size:30px;
letter-spacing:1px;
}

input{
width:100%;
padding:15px;
margin-bottom:18px;
border:none;
outline:none;
border-radius:12px;
background:rgba(255,255,255,.15);
color:#fff;
font-size:16px;
transition:.3s;
}

input::placeholder{
color:#ddd;
}

input:focus{
background:rgba(255,255,255,.22);
box-shadow:0 0 12px #60a5fa;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#2563eb,#3b82f6);
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-2px);
background:linear-gradient(90deg,#1d4ed8,#2563eb);
box-shadow:0 10px 25px rgba(37,99,235,.45);
}

.footer{
margin-top:20px;
text-align:center;
color:#ddd;
font-size:14px;
}

@media(max-width:450px){

.login-box{
width:90%;
padding:30px 20px;
}

h2{
font-size:25px;
}

.logo{
font-size:55px;
}

}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">🛡️</div>

<h2>Admin Login</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="footer">
Secure Admin Panel
</div>

</div>

<script>

async function login(){

const res = await fetch("/api/admin/login",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

username:username.value,

password:password.value

})

});

const data = await res.json();

if(data.success){

localStorage.setItem("adminToken",data.token);

location.href="admin.html";

}else{

alert(data.message);

}

}

</script>

</body>

</html>
