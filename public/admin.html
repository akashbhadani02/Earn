<!DOCTYPE html>
<html>

<head>

    <title>Admin Panel</title>

    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

body{
    background: linear-gradient(135deg,#0f172a,#1e293b,#334155);
    min-height:100vh;
    padding:30px;
    color:#fff;
}

h2{
    margin:20px 0;
    font-size:28px;
    font-weight:bold;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:18px;
    padding:25px;
    text-align:center;
    transition:.3s;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 18px 40px rgba(0,0,0,.4);
}

.card h3{
    color:#cbd5e1;
    margin-bottom:10px;
    font-size:18px;
}

.card h1{
    font-size:38px;
    color:#38bdf8;
}

input{
    width:100%;
    max-width:350px;
    padding:14px 18px;
    border:none;
    outline:none;
    border-radius:12px;
    margin:20px 0;
    font-size:16px;
    background:#fff;
    color:#000;
}

table{
    width:100%;
    border-collapse:collapse;
    overflow:hidden;
    border-radius:15px;
    background:#fff;
    color:#111827;
    box-shadow:0 10px 25px rgba(0,0,0,.25);
    margin-bottom:35px;
}

thead{
    background:linear-gradient(90deg,#2563eb,#1d4ed8);
    color:#fff;
}

th{
    padding:16px;
    font-size:15px;
    letter-spacing:.5px;
}

td{
    padding:14px;
    border-bottom:1px solid #e5e7eb;
}

tbody tr:nth-child(even){
    background:#f8fafc;
}

tbody tr:hover{
    background:#dbeafe;
    transition:.3s;
}

button{
    border:none;
    border-radius:8px;
    padding:8px 14px;
    margin:3px;
    color:#fff;
    cursor:pointer;
    font-weight:600;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

/* Edit Button */
button:nth-child(1){
    background:#2563eb;
}

/* Delete / Reject */
button:nth-child(2){
    background:#ef4444;
}

/* Third Button */
button:nth-child(3){
    background:#f59e0b;
}

/* Logout Button */
div button{
    background:linear-gradient(90deg,#ef4444,#dc2626)!important;
    padding:12px 22px;
    border-radius:10px;
    font-size:15px;
}

div button:hover{
    background:linear-gradient(90deg,#dc2626,#b91c1c)!important;
}

@media(max-width:768px){

    body{
        padding:15px;
    }

    h2{
        font-size:22px;
    }

    table{
        display:block;
        overflow-x:auto;
        white-space:nowrap;
    }

    .cards{
        grid-template-columns:1fr;
    }

    input{
        width:100%;
    }

}
    </style>

</head>

<body>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
    <h2>Admin Dashboard</h2>

    <button onclick="logout()"
        style="background:red;color:white;border:none;padding:10px 18px;border-radius:6px;">
        Logout
    </button>
</div>

    <div class="cards">

        <div class="card">
            <h3>Total Users</h3>
            <h1 id="totalUsers">0</h1>
        </div>

        <div class="card">
            <h3>Total Wallet</h3>
            <h1 id="wallet">0</h1>
        </div>

        <div class="card">
            <h3>Total Earn</h3>
            <h1 id="earn">0</h1>
        </div>

        <div class="card">
            <h3>Pending Withdraw</h3>
            <h1 id="withdraw">0</h1>
        </div>

    </div>
    <h2>Withdraw Requests</h2>

    <table>

        <thead>

            <tr>

                <th>Name</th>

                <th>Mobile</th>

                <th>Amount</th>

                <th>Status</th>

                <th>Date</th>

                <th>Action</th>

            </tr>

        </thead>

        <tbody id="withdrawTable">

        </tbody>

    </table>

    <input id="search" placeholder="Search User" onkeyup="searchUser()">

    <h2>All Users</h2>

    <table>

        <thead>

            <tr>

                <th>Name</th>
                <th>Mobile</th>
                <th>Wallet</th>
                <th>Total Earn</th>
                <th>Action</th>

            </tr>

        </thead>

        <tbody id="userTable">

        </tbody>

    </table>

    <script>

        const token = localStorage.getItem("adminToken");

        if (!token) {

            location.href = "admin-login.html";

        }

        let allUsers = [];

        //==========================
        // Dashboard
        //==========================

        async function loadDashboard() {

            const res = await fetch("/api/admin/dashboard", {

                headers: {

                    Authorization: "Bearer " + token

                }

            });

            const data = await res.json();

            if (!data.success) {

                alert(data.message);

                return;

            }

            document.getElementById("totalUsers").innerHTML = data.totalUsers;
            document.getElementById("wallet").innerHTML = data.totalWallet;
            document.getElementById("earn").innerHTML = data.totalEarn;
            document.getElementById("withdraw").innerHTML = data.pendingWithdraw;

        }

        //==========================
        // Load Users
        //==========================

        async function loadUsers() {

            const res = await fetch("/api/admin/users", {

                headers: {

                    Authorization: "Bearer " + token

                }

            });

            const data = await res.json();

            if (!data.success) {

                alert(data.message);

                return;

            }

            allUsers = data.users || [];

            showUsers(allUsers);

        }

        //==========================
        // Show Users
        //==========================

        function showUsers(users) {

            let html = "";

            users.forEach(user => {

                html += `

<tr>

<td>${user.name}</td>

<td>${user.mobile}</td>

<td>${user.wallet}</td>

<td>${user.totalEarn}</td>

<td>

<button onclick="editWallet('${user._id}',${user.wallet})">

Edit

</button>

<button onclick="deleteUser('${user._id}')">

Delete

</button>

</td>

</tr>

`;

            });

            document.getElementById("userTable").innerHTML = html;

        }

        //==========================
        // Search
        //==========================

        function searchUser() {

            const value = document
                .getElementById("search")
                .value
                .toLowerCase();

            const filtered = allUsers.filter(user => {

                return user.name.toLowerCase().includes(value)
                    ||
                    user.mobile.includes(value);

            });

            showUsers(filtered);

        }

        //==========================
        // Edit Wallet
        //==========================

        async function editWallet(id, currentWallet) {

            const amount = prompt("Enter New Wallet", currentWallet);

            if (amount == null) return;
            if (isNaN(amount)) {

                alert("Enter Valid Number");

                return;

            }

            await fetch("/api/admin/wallet/" + id, {

                method: "PUT",

                headers: {

                    "Content-Type": "application/json",

                    Authorization: "Bearer " + token

                },

                body: JSON.stringify({

                    wallet: Number(amount)

                })

            });

            loadUsers();

            loadDashboard();

        }

        //==========================
        // Delete User
        //==========================

        async function deleteUser(id) {

            if (!confirm("Delete User?")) return;

            await fetch("/api/admin/user/" + id, {

                method: "DELETE",

                headers: {

                    Authorization: "Bearer " + token

                }

            });

            loadUsers();

            loadDashboard();

        }

        async function loadWithdraws() {

            const res = await fetch(

                "/api/admin/withdraws",

                {

                    headers: {

                        Authorization: "Bearer " + token

                    }

                }

            );

            const data = await res.json();

            let html = "";

            const list = data.withdraws || [];

            list.forEach(w => {

                html += `

<tr>

<td>${w.name}</td>

<td>${w.mobile}</td>

<td>${w.amount}</td>

<td>${w.status}</td>

<td>${new Date(w.date).toLocaleString()}</td>

<td>

<button onclick="approveWithdraw('${w.userId}','${w.requestId}')">
Approve
</button>

<button onclick="rejectWithdraw('${w.userId}','${w.requestId}')">
Reject
</button>

<button onclick="deleteWithdraw('${w.userId}','${w.requestId}')">
Delete
</button>

</td>

</tr>

`;

            });

            document.getElementById("withdrawTable").innerHTML = html;

        }

        async function approveWithdraw(userId, requestId) {

            await fetch(

                "/api/admin/withdraw/approve/" + userId + "/" + requestId,

                {

                    method: "PUT",

                    headers: {

                        Authorization: "Bearer " + token

                    }

                }

            );

            loadWithdraws();

            loadDashboard();

        }

        async function rejectWithdraw(userId, requestId) {

            await fetch(

                "/api/admin/withdraw/reject/" + userId + "/" + requestId,

                {

                    method: "PUT",

                    headers: {

                        Authorization: "Bearer " + token

                    }

                }

            );

            loadWithdraws();

            loadDashboard();

        }

        //==========================
// Logout
//==========================

function logout() {

    if (!confirm("Are you sure you want to logout?")) return;

    localStorage.removeItem("adminToken");

    location.href = "admin-login.html";

}

async function deleteWithdraw(userId, requestId) {

    if (!confirm("Delete this withdraw request?")) return;

    await fetch(
        "/api/admin/withdraw/delete/" + userId + "/" + requestId,
        {
            method: "DELETE",
            headers: {
                Authorization: "Bearer " + token
            }
        }
    );

    loadWithdraws();
    loadDashboard();
}
        //==========================

        loadDashboard();

        loadUsers();

        loadWithdraws();
    </script>

</body>

</html>
